steps:
  - id: install
    name: 'node:22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install --frozen-lockfile

  - id: prisma-generate
    name: 'node:22'
    entrypoint: 'bash'
    env:
      - 'DATABASE_URL=postgres://localhost:5432/test'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm --filter @repo/database db:generate

  - id: test
    name: 'node:22'
    entrypoint: 'bash'
    env:
      - 'DATABASE_URL=postgres://localhost:5432/test'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm --filter @apps/gateway test

  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=DATABASE_URL=postgres://placeholder:placeholder@localhost:5432/worldpay'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/worldpay-api-tester/gateway:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/worldpay-api-tester/gateway:latest'
      - '.'

  - id: push
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/worldpay-api-tester/gateway:$SHORT_SHA'

  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'worldpay-api-tester-dev'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/worldpay-api-tester/gateway:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=300'
      - '--network=default'
      - '--subnet=default'
      - '--vpc-egress=all-traffic'
      - '--set-cloudsql-instances=cosmic-heaven-479306-v5:us-central1:ai-dev'
      - '--set-env-vars=NODE_ENV=production,ALLOWED_EMAIL_DOMAIN=fmmpay.com,BETTER_AUTH_URL=https://worldpay-api-tester-dev-903828198190.us-central1.run.app'
      - '--set-secrets=DATABASE_URL=worldpay-api-tester-db-url:latest'
      - '--set-secrets=WORLDPAY_USERNAME=worldpay-api-tester-wp-username:latest'
      - '--set-secrets=WORLDPAY_PASSWORD=worldpay-api-tester-wp-password:latest'
      - '--set-secrets=BETTER_AUTH_SECRET=worldpay-api-tester-auth-secret:latest'
      - '--set-secrets=ENCRYPTION_KEY=worldpay-api-tester-encryption-key:latest'

timeout: 1200s
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/worldpay-api-tester/gateway:$SHORT_SHA'
