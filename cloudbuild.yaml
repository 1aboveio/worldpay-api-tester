steps:
  - name: 'node:22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install --frozen-lockfile

  - name: 'node:22'
    entrypoint: 'bash'
    env:
      - 'DATABASE_URL=postgres://localhost:5432/test'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm --filter @repo/database db:generate

  - name: 'node:22'
    entrypoint: 'bash'
    env:
      - 'DATABASE_URL=postgres://localhost:5432/test'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm test -- --run

timeout: 600s
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
