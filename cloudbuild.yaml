steps:
  - name: 'node:22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install --frozen-lockfile

  - name: 'node:22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        cd packages/database
        npx prisma generate

  - name: 'node:22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm test -- --run

timeout: 600s
options:
  machineType: 'E2_HIGHCPU_8'
